<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradiente principal -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1">
        <animate attributeName="stop-color" values="#6366F1;#8B5CF6;#EC4899;#6366F1" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#8B5CF6">
        <animate attributeName="stop-color" values="#8B5CF6;#EC4899;#6366F1;#8B5CF6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#EC4899">
        <animate attributeName="stop-color" values="#EC4899;#6366F1;#8B5CF6;#EC4899" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Gradiente secundario -->
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    
    <!-- Filtro de brillo -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Sombra -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366F1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Círculo exterior con animación -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Círculo medio -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="15s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Círculo interior con brillo -->
  <circle cx="50" cy="50" r="30" fill="url(#logoGradient)" filter="url(#glow)">
    <animate attributeName="r" values="30;32;30" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- E de EP360 -->
  <text x="50" y="58" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">
    E
    <animate attributeName="fill" values="white;#06B6D4;white" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- Puntos decorativos -->
  <circle cx="50" cy="15" r="3" fill="#06B6D4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="50" cy="85" r="3" fill="#EC4899" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  
  <circle cx="15" cy="50" r="3" fill="#6366F1" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  
  <circle cx="85" cy="50" r="3" fill="#8B5CF6" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  
  <!-- Líneas orbitales -->
  <line x1="20" y1="20" x2="35" y2="35" stroke="url(#glowGradient)" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <line x1="80" y1="20" x2="65" y2="35" stroke="url(#glowGradient)" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="1s"/>
  </line>
  
  <line x1="20" y1="80" x2="35" y2="65" stroke="url(#glowGradient)" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </line>
  
  <line x1="80" y1="80" x2="65" y2="65" stroke="url(#glowGradient)" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </line>
</svg>
